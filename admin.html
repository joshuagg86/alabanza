<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Studio - Seguro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    
    <script src="config.js"></script>
</head>
<body style="display:none;" id="adminBody">

    <div class="container">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="logo.png" alt="Logo" style="height: 38px; width: auto; object-fit: contain;">
                <h1 style="margin: 0; font-size: 22px; color: white; background: none; -webkit-text-fill-color: initial;">Admin</h1>
            </div>
            
            <button class="btn btn-secondary" onclick="irALista()" style="padding: 8px 16px; font-size: 14px;">
                <i class="fas fa-arrow-left"></i> Regresar
            </button>
        </header>

        <div class="mobile-tabs">
            <button id="tabEditor" class="tab-btn active" onclick="switchTab('editor')">✏️ Editor</button>
            <button id="tabPreview" class="tab-btn" onclick="switchTab('preview')">👁️ Vista Previa</button>
        </div>

        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchEdit" placeholder="Buscar canción para editar..." onkeyup="buscarParaEditar()">
            <div id="searchResults" class="search-results-dropdown"></div>
        </div>

        <div class="editor-grid">
            <div id="editorPanel" class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 id="formTitle" style="margin:0; color:white;">Composición</h2>
                    <div style="display:flex; gap:8px;">
                        <label for="pdfUpload" class="btn-tool" style="cursor:pointer;" title="Importar PDF">
                            <i class="fas fa-file-pdf"></i>
                        </label>
                        <input type="file" id="pdfUpload" accept=".pdf" style="display:none;" onchange="procesarPDF()">
                        
                        <button class="btn-tool" onclick="convertirLaCuerda()" title="Arreglar formato web">
                            <i class="fas fa-magic"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <input type="text" id="titulo" placeholder="Título de la canción">
                </div>
                <div class="form-group">
                    <input type="text" id="artista" placeholder="Artista / Autor">
                </div>
                
                <div class="form-group" style="display:flex; gap:10px;">
                    <select id="tono" style="flex:1;">
                        <option value="" disabled selected>Tono</option>
                        <option value="C">C</option><option value="Cm">Cm</option>
                        <option value="C#">C#</option><option value="D">D</option>
                        <option value="Dm">Dm</option>
                        <option value="Eb">Eb</option><option value="E">E</option><option value="Em">Em</option>
                        <option value="F">F</option><option value="Fm">Fm</option>
                        <option value="F#">F#</option><option value="G">G</option><option value="Gm">Gm</option>
                        <option value="Ab">Ab</option><option value="A">A</option><option value="Am">Am</option>
                        <option value="Bb">Bb</option><option value="B">B</option><option value="Bm">Bm</option>
                    </select>
                    <input type="number" id="bpm" placeholder="BPM" style="flex:1;">
                    <select id="compas" style="flex:1;">
                        <option value="" disabled selected>Compás</option>
                        <option value="4/4">4/4</option><option value="6/8">6/8</option><option value="3/4">3/4</option>
                        <option value="2/4">2/4</option>
                    </select>
                </div>

                <div class="structure-bar">
                    <button onclick="insertarSeccion('Intro')" class="struct-btn tag-intro">Intro</button>
                    <button onclick="insertarSeccion('Verso 1')" class="struct-btn tag-verso">Verso 1</button>
                    <button onclick="insertarSeccion('Verso 2')" class="struct-btn tag-verso">Verso 2</button>
                    <button onclick="insertarSeccion('Pre-Coro')" class="struct-btn tag-precoro">Pre-Coro</button>
                    <button onclick="insertarSeccion('Coro')" class="struct-btn tag-coro">Coro</button>
                    <button onclick="insertarSeccion('Puente')" class="struct-btn tag-puente">Puente</button>
                    <button onclick="insertarSeccion('Final')" class="struct-btn tag-final">Final</button>
                </div>

                <textarea id="letraInput" oninput="actualizarPrevisualizacion()" placeholder="Escribe aquí... Usa [C] para acordes."></textarea>
                
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button id="btnSave" class="btn btn-primary" style="flex:1; justify-content:center;" onclick="guardarCancion()">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <button id="btnDelete" class="btn btn-danger" style="display:none; width:50px; justify-content:center;" onclick="eliminarCancion()" title="Eliminar">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button id="btnCancelEdit" class="btn btn-secondary" style="display:none; width:50px; justify-content:center;" onclick="cancelarEdicion()" title="Cancelar">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div id="previewPanel" class="card preview-card mobile-hidden">
                <div id="previewArea" class="lyrics-container">
                    <div style="text-align: center; color: #333; margin-top: 100px;">
                        <i class="fas fa-music fa-3x" style="opacity:0.2;"></i>
                        <p style="opacity:0.2; margin-top:20px; font-size:12px;">Vista previa en tiempo real</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="customModal" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="modalIcon" class="modal-icon">👋</div>
            <div id="modalTitle" class="modal-title">Título</div>
            <div id="modalText" class="modal-text">Mensaje</div>
            <input type="text" id="modalInput" class="modal-input-field" style="display:none;" autocomplete="off">
            <div class="modal-actions">
                <button id="btnModalCancel" class="btn-modal cancel">Cancelar</button>
                <button id="btnModalConfirm" class="btn-modal confirm">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>

    <script>
        // SEGURIDAD
        const ADMIN_EMAIL = "admin@genesaret.com"; 

        function switchTab(tab) {
            const editor = document.getElementById('editorPanel');
            const preview = document.getElementById('previewPanel');
            const btnEditor = document.getElementById('tabEditor');
            const btnPreview = document.getElementById('tabPreview');

            if (tab === 'editor') {
                editor.classList.remove('mobile-hidden');
                preview.classList.add('mobile-hidden');
                btnEditor.classList.add('active');
                btnPreview.classList.remove('active');
            } else {
                editor.classList.add('mobile-hidden');
                preview.classList.remove('mobile-hidden');
                btnEditor.classList.remove('active');
                btnPreview.classList.add('active');
            }
        }

        // Verificación de Auth
        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'index.html';
            } else if (user.email !== ADMIN_EMAIL) {
                alert("⛔ ACCESO DENEGADO");
                firebase.auth().signOut().then(() => {
                    window.location.href = 'index.html';
                });
            } else {
                // ✅ ADMIN VALIDADO
                document.getElementById('adminBody').style.display = 'block';
                // Ya no imprimimos el correo en el header para que se vea más limpio
                console.log("Sesión activa como administrador.");
                
                if(window.iniciarAdmin) window.iniciarAdmin();
            }
        });
    </script>
</body>
</html>
