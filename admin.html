<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Studio - Seguro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Toolbar principal con espaciado optimizado */
        .admin-toolbar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
        
        .group-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #666;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        /* Botón Maestro de Estructura y Dropdown */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #131316;
            min-width: 180px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.8);
            z-index: 1000;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 5px;
        }
        .dropdown:hover .dropdown-content { display: block; }
        
        .dropdown-content button {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s;
        }
        .dropdown-content button:hover { background: rgba(99, 102, 241, 0.2); }
        .dropdown-content button:last-child { border-bottom: none; }

        /* Estilos de botones de Visibilidad */
        .struct-btn {
            padding: 10px 16px;
            border-radius: 12px;
            border: none;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }
        .btn-gt { background: #4f46e5 !important; color: white !important; }
        .btn-gt-end { background: #312e81 !important; color: white !important; }
        .btn-bv { background: #f59e0b !important; color: black !important; }
        .btn-bv-end { background: #b45309 !important; color: white !important; }
        
        /* Botón Estructura (Dorado/Indigo) */
        .btn-main-struct {
            background: rgba(255,255,255,0.1) !important;
            color: white !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="config.js"></script>
</head>
<body style="display:none;" id="adminBody">

    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="logo.png" alt="Logo" style="height: 38px; width: auto;">
                <h1 style="margin: 0; font-size: 22px; color: white;">Admin Studio</h1>
            </div>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i> Regresar
            </button>
        </header>

        <div class="mobile-tabs">
            <button id="tabEditor" class="tab-btn active" onclick="switchTab('editor')">✏️ Editor</button>
            <button id="tabPreview" class="tab-btn" onclick="switchTab('preview')">👁️ Vista Previa</button>
        </div>

        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchEdit" placeholder="Buscar canción para editar..." onkeyup="buscarParaEditar()">
            <div id="searchResults" class="search-results-dropdown"></div>
        </div>

        <div class="editor-grid">
            <div id="editorPanel" class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 id="formTitle" style="margin:0; color:white;">Composición</h2>
                    <div style="display:flex; gap:8px;">
                        <label for="pdfUpload" class="btn-tool" style="cursor:pointer;" title="Importar PDF">
                            <i class="fas fa-file-pdf"></i>
                        </label>
                        <input type="file" id="pdfUpload" accept=".pdf" style="display:none;" onchange="procesarPDF()">
                        <button class="btn-tool" onclick="convertirLaCuerda()" title="Arreglar formato web">
                            <i class="fas fa-magic"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group"><input type="text" id="titulo" placeholder="Título de la canción"></div>
                <div class="form-group"><input type="text" id="artista" placeholder="Artista / Autor"></div>
                
                <div class="form-group" style="display:flex; gap:10px;">
                    <select id="tono" style="flex:1;"><option value="" disabled selected>Tono</option><option value="C">C</option><option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option><option value="A">A</option><option value="B">B</option></select>
                    <input type="number" id="bpm" placeholder="BPM" style="flex:1;">
                    <select id="compas" style="flex:1;"><option value="4/4">4/4</option><option value="6/8">6/8</option></select>
                </div>

                <div class="admin-toolbar">
                    <div class="btn-row">
                        <button onclick="insertarComando('[INICIO-SOLO-GT]')" class="struct-btn btn-gt">+ Solo G/T</button>
                        <button onclick="insertarComando('[FIN-SOLO-GT]')" class="struct-btn btn-gt-end">- Fin Solo G/T</button>
                        
                        <button onclick="insertarComando('[INICIO-REPETICION]')" class="struct-btn btn-bv">+ Solo B/V</button>
                        <button onclick="insertarComando('[FIN-REPETICION]')" class="struct-btn btn-bv-end">- Fin Solo B/V</button>

                        <div class="dropdown">
                            <button class="struct-btn btn-main-struct">Estructura <i class="fas fa-caret-down"></i></button>
                            <div class="dropdown-content">
                                <button onclick="insertarSeccion('Intro')">Intro</button>
                                <button onclick="insertarSeccion('Verso 1')">Verso 1</button>
                                <button onclick="insertarSeccion('Verso 2')">Verso 2</button>
                                <button onclick="insertarSeccion('Verso 3')">Verso 3</button>
                                <button onclick="insertarSeccion('Pre-Coro')">Pre-Coro</button>
                                <button onclick="insertarSeccion('Coro')">Coro 1</button>
                                <button onclick="insertarSeccion('Coro 2')">Coro 2</button>
                                <button onclick="insertarSeccion('Coro 3')">Coro 3</button>
                                <button onclick="insertarSeccion('Puente')">Puente</button>
                                <button onclick="insertarSeccion('Final')">Final</button>
                            </div>
                        </div>
                    </div>
                </div>

                <textarea id="letraInput" oninput="actualizarPrevisualizacion()" placeholder="Escribe aquí... Usa [C] para acordes."></textarea>
                
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button id="btnSave" class="btn btn-primary" style="flex:1;" onclick="guardarCancion()">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                </div>
            </div>

            <div id="previewPanel" class="card preview-card mobile-hidden">
                <div id="previewArea" class="lyrics-container"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const ADMIN_EMAIL = "admin@genesaret.com"; 

        function insertarSeccion(nombre) {
            insertarComando(nombre + ":\n");
        }

        function insertarComando(comando) {
            const el = document.getElementById('letraInput');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const texto = el.value;
            el.value = texto.slice(0, start) + comando + texto.slice(end);
            el.focus();
            if(window.actualizarPrevisualizacion) actualizarPrevisualizacion();
        }

        function switchTab(tab) {
            const editor = document.getElementById('editorPanel');
            const preview = document.getElementById('previewPanel');
            if (tab === 'editor') {
                editor.classList.remove('mobile-hidden');
                preview.classList.add('mobile-hidden');
            } else {
                editor.classList.add('mobile-hidden');
                preview.classList.remove('mobile-hidden');
            }
        }

        firebase.auth().onAuthStateChanged(user => {
            if (!user || user.email !== ADMIN_EMAIL) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('adminBody').style.display = 'block';
                if(window.iniciarAdmin) window.iniciarAdmin();
            }
        });
    </script>
</body>
</html>
